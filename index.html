<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profit Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .calculator {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #444;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0056b3;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #eef7ee;
      border-radius: 10px;
      text-align: center;
    }

    .profit {
      color: green;
      font-size: 22px;
      font-weight: bold;
    }

    .loss {
      color: red;
      font-size: 22px;
      font-weight: bold;
    }

    .details {
      margin-top: 10px;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <h1>Profit Calculator</h1>

    <div class="input-group">
      <label>Selling Price</label>
      <input type="number" id="sellingPrice" placeholder="Enter selling price">
    </div>

    <div class="input-group">
      <label>Buying Price</label>
      <input type="number" id="buyingPrice" placeholder="Enter buying price">
    </div>

    <div class="input-group">
      <label>Ad Cost</label>
      <input type="number" id="adCost" placeholder="Enter ad cost">
    </div>

    <div class="input-group">
      <label>Other Costs</label>
      <input type="number" id="otherCost" placeholder="Enter other costs">
    </div>

    <button onclick="calculateProfit()">Calculate Profit</button>

    <div class="result" id="result">
      <p>Your result will appear here.</p>
    </div>
  </div>

  <script>
    function calculateProfit() {
      const sellingPrice = parseFloat(document.getElementById('sellingPrice').value) || 0;
      const buyingPrice = parseFloat(document.getElementById('buyingPrice').value) || 0;
      const adCost = parseFloat(document.getElementById('adCost').value) || 0;
      const otherCost = parseFloat(document.getElementById('otherCost').value) || 0;

      const totalCost = buyingPrice + adCost + otherCost;
      const profit = sellingPrice - totalCost;

      const resultDiv = document.getElementById('result');

      if (profit > 0) {
        resultDiv.innerHTML = `
          <div class="profit">Profit: $${profit.toFixed(2)}</div>
          <div class="details">
            Total Cost: $${totalCost.toFixed(2)}
          </div>
        `;
      } else if (profit < 0) {
        resultDiv.innerHTML = `
          <div class="loss">Loss: $${Math.abs(profit).toFixed(2)}</div>
          <div class="details">
            Total Cost: $${totalCost.toFixed(2)}
          </div>
        `;
      } else {
        resultDiv.innerHTML = `
          <div class="details">
            No Profit, No Loss
          </div>
        `;
      }
    }
  </script>

</body>
</html>
