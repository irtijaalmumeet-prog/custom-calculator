<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Profit Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .calculator {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 450px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .input-group {
      margin-bottom: 18px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
      color: #444;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input, select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    input[type="number"] {
      flex: 1;
    }

    .qty {
      width: 80px;
    }

    .currency {
      width: 110px;
    }

    small {
      display: block;
      margin-top: 5px;
      color: #666;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      background: #0056b3;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #f1f1f1;
      text-align: center;
    }

    .profit {
      color: green;
      font-size: 24px;
      font-weight: bold;
    }

    .loss {
      color: red;
      font-size: 24px;
      font-weight: bold;
    }

    .details {
      margin-top: 10px;
      color: #555;
    }
  </style>
</head>
<body>

<div class="calculator">

  <h1>Profit Calculator</h1>

  <!-- Selling Price -->
  <div class="input-group">
    <label>Selling Price</label>

    <div class="input-row">
      <input type="number" id="sellingPrice" placeholder="Price per item">

      <input
        type="number"
        id="sellingQty"
        class="qty"
        placeholder="Qty"
        value="1"
      >

      <select id="sellingCurrency" class="currency">
        <option value="USD">USDT/USD</option>
        <option value="GBP">GBP</option>
        <option value="EUR">EUR</option>
      </select>
    </div>

    <small>
      Total:
      <span id="sellingTotal">0.00</span>
    </small>
  </div>

  <!-- Buying Price -->
  <div class="input-group">
    <label>Buying Price</label>

    <div class="input-row">
      <input type="number" id="buyingPrice" placeholder="Price per item">

      <input
        type="number"
        id="buyingQty"
        class="qty"
        placeholder="Qty"
        value="1"
      >

      <select id="buyingCurrency" class="currency">
        <option value="USD">USDT/USD</option>
        <option value="GBP">GBP</option>
        <option value="EUR">EUR</option>
      </select>
    </div>

    <small>
      Total:
      <span id="buyingTotal">0.00</span>
    </small>
  </div>

  <!-- Ad Cost -->
  <div class="input-group">
    <label>Ad Cost</label>

    <div class="input-row">
      <input type="number" id="adCost" placeholder="Ad cost">

      <select id="adCurrency" class="currency">
        <option value="USD">USDT/USD</option>
        <option value="GBP">GBP</option>
        <option value="EUR">EUR</option>
      </select>
    </div>
  </div>

  <!-- Other Cost -->
  <div class="input-group">
    <label>Other Cost</label>

    <div class="input-row">
      <input type="number" id="otherCost" placeholder="Other cost">

      <select id="otherCurrency" class="currency">
        <option value="USD">USDT/USD</option>
        <option value="GBP">GBP</option>
        <option value="EUR">EUR</option>
      </select>
    </div>
  </div>

  <!-- Result Currency -->
  <div class="input-group">
    <label>Result Currency</label>

    <select id="resultCurrency" style="width:100%;">
      <option value="USD">USDT/USD</option>
      <option value="GBP">GBP</option>
      <option value="EUR">EUR</option>
    </select>
  </div>

  <button onclick="calculateProfit()">
    Calculate Profit
  </button>

  <div class="result" id="result">
    Your result will appear here.
  </div>

</div>

<script>

  // LIVE TOTALS
  function updateTotals() {

    const sellingPrice =
      parseFloat(document.getElementById("sellingPrice").value) || 0;

    const sellingQty =
      parseFloat(document.getElementById("sellingQty").value) || 1;

    const buyingPrice =
      parseFloat(document.getElementById("buyingPrice").value) || 0;

    const buyingQty =
      parseFloat(document.getElementById("buyingQty").value) || 1;

    document.getElementById("sellingTotal").innerText =
      (sellingPrice * sellingQty).toFixed(2);

    document.getElementById("buyingTotal").innerText =
      (buyingPrice * buyingQty).toFixed(2);
  }

  document.addEventListener("input", updateTotals);

  // GET EXCHANGE RATE
  async function getExchangeRate(from, to) {

    if (from === to) return 1;

    try {

      const response = await fetch(
        `https://api.exchangerate.host/convert?from=${from}&to=${to}`
      );

      const data = await response.json();

      return data.result;

    } catch (error) {

      alert("Currency conversion failed.");

      return 1;
    }
  }

  // CONVERT CURRENCY
  async function convertCurrency(amount, from, to) {

    const rate =
      await getExchangeRate(from, to);

    return amount * rate;
  }

  // MAIN CALCULATION
  async function calculateProfit() {

    const resultCurrency =
      document.getElementById("resultCurrency").value;

    // SELLING
    const sellingPrice =
      parseFloat(document.getElementById("sellingPrice").value) || 0;

    const sellingQty =
      parseFloat(document.getElementById("sellingQty").value) || 1;

    const sellingTotal =
      sellingPrice * sellingQty;

    // BUYING
    const buyingPrice =
      parseFloat(document.getElementById("buyingPrice").value) || 0;

    const buyingQty =
      parseFloat(document.getElementById("buyingQty").value) || 1;

    const buyingTotal =
      buyingPrice * buyingQty;

    // OTHER COSTS
    const adCost =
      parseFloat(document.getElementById("adCost").value) || 0;

    const otherCost =
      parseFloat(document.getElementById("otherCost").value) || 0;

    // CURRENCIES
    const sellingCurrency =
      document.getElementById("sellingCurrency").value;

    const buyingCurrency =
      document.getElementById("buyingCurrency").value;

    const adCurrency =
      document.getElementById("adCurrency").value;

    const otherCurrency =
      document.getElementById("otherCurrency").value;

    // CONVERT EVERYTHING
    const sellingConverted =
      await convertCurrency(
        sellingTotal,
        sellingCurrency,
        resultCurrency
      );

    const buyingConverted =
      await convertCurrency(
        buyingTotal,
        buyingCurrency,
        resultCurrency
      );

    const adConverted =
      await convertCurrency(
        adCost,
        adCurrency,
        resultCurrency
      );

    const otherConverted =
      await convertCurrency(
        otherCost,
        otherCurrency,
        resultCurrency
      );

    // TOTAL COST
    const totalCost =
      buyingConverted +
      adConverted +
      otherConverted;

    // FINAL PROFIT
    const profit =
      sellingConverted - totalCost;

    const resultDiv =
      document.getElementById("result");

    // DISPLAY RESULT
    if (profit > 0) {

      resultDiv.innerHTML = `
        <div class="profit">
          Profit: ${profit.toFixed(2)} ${resultCurrency}
        </div>

        <div class="details">
          Revenue:
          ${sellingConverted.toFixed(2)} ${resultCurrency}
          <br><br>

          Total Cost:
          ${totalCost.toFixed(2)} ${resultCurrency}
        </div>
      `;

    } else if (profit < 0) {

      resultDiv.innerHTML = `
        <div class="loss">
          Loss: ${Math.abs(profit).toFixed(2)} ${resultCurrency}
        </div>

        <div class="details">
          Revenue:
          ${sellingConverted.toFixed(2)} ${resultCurrency}
          <br><br>

          Total Cost:
          ${totalCost.toFixed(2)} ${resultCurrency}
        </div>
      `;

    } else {

      resultDiv.innerHTML = `
        <div class="details">
          No Profit No Loss
        </div>
      `;
    }
  }

</script>

</body>
</html>
