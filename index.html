<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Profit Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .calculator {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 420px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input, select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }

    input {
      flex: 1;
    }

    select {
      width: 100px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #0056b3;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #f1f1f1;
      text-align: center;
    }

    .profit {
      color: green;
      font-size: 24px;
      font-weight: bold;
    }

    .loss {
      color: red;
      font-size: 24px;
      font-weight: bold;
    }

    .details {
      margin-top: 10px;
      color: #555;
    }
  </style>
</head>
<body>

<div class="calculator">
  <h1>Profit Calculator</h1>

  <!-- Selling Price -->
  <div class="input-group">
    <label>Selling Price</label>
    <div class="input-row">
      <input type="number" id="sellingPrice" placeholder="Enter amount">
      <select id="sellingCurrency">
        <option value="USD">USDT/USD</option>
        <option value="GBP">GBP</option>
        <option value="EUR">EUR</option>
      </select>
    </div>
  </div>

  <!-- Buying Price -->
  <div class="input-group">
    <label>Buying Price</label>
    <div class="input-row">
      <input type="number" id="buyingPrice" placeholder="Enter amount">
      <select id="buyingCurrency">
        <option value="USD">USDT/USD</option>
        <option value="GBP">GBP</option>
        <option value="EUR">EUR</option>
      </select>
    </div>
  </div>

  <!-- Ad Cost -->
  <div class="input-group">
    <label>Ad Cost</label>
    <div class="input-row">
      <input type="number" id="adCost" placeholder="Enter amount">
      <select id="adCurrency">
        <option value="USD">USDT/USD</option>
        <option value="GBP">GBP</option>
        <option value="EUR">EUR</option>
      </select>
    </div>
  </div>

  <!-- Other Cost -->
  <div class="input-group">
    <label>Other Cost</label>
    <div class="input-row">
      <input type="number" id="otherCost" placeholder="Enter amount">
      <select id="otherCurrency">
        <option value="USD">USDT/USD</option>
        <option value="GBP">GBP</option>
        <option value="EUR">EUR</option>
      </select>
    </div>
  </div>

  <!-- Result Currency -->
  <div class="input-group">
    <label>Result Currency</label>
    <select id="resultCurrency" style="width:100%;">
      <option value="USD">USDT/USD</option>
      <option value="GBP">GBP</option>
      <option value="EUR">EUR</option>
    </select>
  </div>

  <button onclick="calculateProfit()">Calculate Profit</button>

  <div class="result" id="result">
    Result will appear here.
  </div>
</div>

<script>

  // Exchange rates API
  // Uses real-time rates
  async function getExchangeRate(from, to) {

    if (from === to) return 1;

    try {
      const response = await fetch(
        `https://api.exchangerate.host/convert?from=${from}&to=${to}`
      );

      const data = await response.json();

      return data.result;

    } catch (error) {
      alert("Currency conversion failed.");
      return 1;
    }
  }

  async function convertCurrency(amount, from, to) {
    const rate = await getExchangeRate(from, to);
    return amount * rate;
  }

  async function calculateProfit() {

    const resultCurrency =
      document.getElementById("resultCurrency").value;

    // Values
    const sellingPrice =
      parseFloat(document.getElementById("sellingPrice").value) || 0;

    const buyingPrice =
      parseFloat(document.getElementById("buyingPrice").value) || 0;

    const adCost =
      parseFloat(document.getElementById("adCost").value) || 0;

    const otherCost =
      parseFloat(document.getElementById("otherCost").value) || 0;

    // Currencies
    const sellingCurrency =
      document.getElementById("sellingCurrency").value;

    const buyingCurrency =
      document.getElementById("buyingCurrency").value;

    const adCurrency =
      document.getElementById("adCurrency").value;

    const otherCurrency =
      document.getElementById("otherCurrency").value;

    // Convert all to selected result currency
    const sellingConverted =
      await convertCurrency(
        sellingPrice,
        sellingCurrency,
        resultCurrency
      );

    const buyingConverted =
      await convertCurrency(
        buyingPrice,
        buyingCurrency,
        resultCurrency
      );

    const adConverted =
      await convertCurrency(
        adCost,
        adCurrency,
        resultCurrency
      );

    const otherConverted =
      await convertCurrency(
        otherCost,
        otherCurrency,
        resultCurrency
      );

    const totalCost =
      buyingConverted +
      adConverted +
      otherConverted;

    const profit =
      sellingConverted - totalCost;

    const resultDiv =
      document.getElementById("result");

    if (profit > 0) {

      resultDiv.innerHTML = `
        <div class="profit">
          Profit: ${profit.toFixed(2)} ${resultCurrency}
        </div>

        <div class="details">
          Total Cost:
          ${totalCost.toFixed(2)} ${resultCurrency}
        </div>
      `;

    } else if (profit < 0) {

      resultDiv.innerHTML = `
        <div class="loss">
          Loss: ${Math.abs(profit).toFixed(2)} ${resultCurrency}
        </div>

        <div class="details">
          Total Cost:
          ${totalCost.toFixed(2)} ${resultCurrency}
        </div>
      `;

    } else {

      resultDiv.innerHTML = `
        <div class="details">
          No Profit No Loss
        </div>
      `;
    }
  }

</script>

</body>
</html>
