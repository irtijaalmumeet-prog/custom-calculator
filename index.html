<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Profit Calculator</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    padding:20px;
}
.calculator{
    background:#fff;
    width:100%;
    max-width:520px;
    padding:25px;
    border-radius:18px;
    box-shadow:0 4px 18px rgba(0,0,0,0.1);
}
h1{
    text-align:center;
    margin-bottom:25px;
    color:#222;
}
.input-group{
    margin-bottom:18px;
}
label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}
.input-row{
    display:flex;
    gap:8px;
}
.input-row input{
    flex:1;
}
input,
select{
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:15px;
    box-sizing:border-box;
}
.qty{
    width:80px;
}
.currency{
    width:120px;
}
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#005eff;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}
button:hover{
    background:#0047c7;
}
.result{
    margin-top:20px;
    padding:18px;
    border-radius:12px;
    background:#f1f1f1;
    text-align:center;
}
.profit{
    color:green;
    font-size:26px;
    font-weight:bold;
}
.loss{
    color:red;
    font-size:26px;
    font-weight:bold;
}
.details{
    margin-top:12px;
    color:#555;
    line-height:1.6;
}
.total-preview{
    margin-top:6px;
    font-size:14px;
    color:#666;
}
.loading{
    color:#005eff;
    font-weight:bold;
}
</style>
</head>
<body>
<div class="calculator">
<h1>Profit Calculator</h1>
<!-- SELLING -->
<div class="input-group">
<label>Selling Price</label>
<div class="input-row">
<input type="number" id="sellingPrice" placeholder="Price per item">
<input
type="number"
id="sellingQty"
class="qty"
placeholder="Qty"
value="1"
min="1"
>
<select id="sellingCurrency" class="currency">
<option value="USD">USDT/USD</option>
<option value="GBP">GBP</option>
<option value="EUR">EUR</option>
</select>
</div>
<div class="total-preview">
Selling Total:
<span id="sellingTotal">0.00</span>
</div>
</div>
<!-- BUYING -->
<div class="input-group">
<label>Buying Price</label>
<div class="input-row">
<input type="number" id="buyingPrice" placeholder="Price per item">
<input
type="number"
id="buyingQty"
class="qty"
placeholder="Qty"
value="1"
min="1"
>
<select id="buyingCurrency" class="currency">
<option value="USD">USDT/USD</option>
<option value="GBP">GBP</option>
<option value="EUR">EUR</option>
</select>
</div>
<div class="total-preview">
Buying Total:
<span id="buyingTotal">0.00</span>
</div>
</div>
<!-- AD COST -->
<div class="input-group">
<label>Ad Cost</label>
<div class="input-row">
<input type="number" id="adCost" placeholder="Ad cost">
<select id="adCurrency" class="currency">
<option value="USD">USDT/USD</option>
<option value="GBP">GBP</option>
<option value="EUR">EUR</option>
</select>
</div>
</div>
<!-- OTHER COST -->
<div class="input-group">
<label>Other Cost</label>
<div class="input-row">
<input type="number" id="otherCost" placeholder="Other cost">
<select id="otherCurrency" class="currency">
<option value="USD">USDT/USD</option>
<option value="GBP">GBP</option>
<option value="EUR">EUR</option>
</select>
</div>
</div>
<!-- RESULT CURRENCY -->
<div class="input-group">
<label>Result Currency</label>
<select id="resultCurrency" style="width:100%;">
<option value="USD">USDT/USD</option>
<option value="GBP">GBP</option>
<option value="EUR">EUR</option>
</select>
</div>
<button onclick="calculateProfit()">
Calculate Profit
</button>
<div class="result" id="result">
Your result will appear here.
</div>
</div>
<script>
// LIVE TOTALS
function updateTotals(){
    const sellingPrice =
    parseFloat(document.getElementById("sellingPrice").value) || 0;
    const sellingQty =
    parseFloat(document.getElementById("sellingQty").value) || 1;
    const buyingPrice =
    parseFloat(document.getElementById("buyingPrice").value) || 0;
    const buyingQty =
    parseFloat(document.getElementById("buyingQty").value) || 1;
    document.getElementById("sellingTotal").innerText =
    (sellingPrice * sellingQty).toFixed(2);
    document.getElementById("buyingTotal").innerText =
    (buyingPrice * buyingQty).toFixed(2);
}
document.addEventListener("input", updateTotals);
// GET EXCHANGE RATE
async function getExchangeRate(from,to){
    if(from === to){
        return 1;
    }
    try{
        // FREE OPEN API
        const response = await fetch(
        `https://open.er-api.com/v6/latest/${from}`
        );
        const data = await response.json();
        return data.rates[to];
    }catch(error){
        alert("Currency conversion failed");
        return 1;
    }
}
// CONVERT
async function convertCurrency(amount,from,to){
    const rate =
    await getExchangeRate(from,to);
    return amount * rate;
}
// MAIN CALCULATION
async function calculateProfit(){
    const resultBox =
    document.getElementById("result");
    resultBox.innerHTML =
    `<div class="loading">Calculating...</div>`;
    // SELLING
    const sellingPrice =
    parseFloat(document.getElementById("sellingPrice").value) || 0;
    const sellingQty =
    parseFloat(document.getElementById("sellingQty").value) || 1;
    const sellingTotal =
    sellingPrice * sellingQty;
    // BUYING
    const buyingPrice =
    parseFloat(document.getElementById("buyingPrice").value) || 0;
    const buyingQty =
    parseFloat(document.getElementById("buyingQty").value) || 1;
    const buyingTotal =
    buyingPrice * buyingQty;
    // OTHER COSTS
    const adCost =
    parseFloat(document.getElementById("adCost").value) || 0;
    const otherCost =
    parseFloat(document.getElementById("otherCost").value) || 0;
    // CURRENCIES
    const sellingCurrency =
    document.getElementById("sellingCurrency").value;
    const buyingCurrency =
    document.getElementById("buyingCurrency").value;
    const adCurrency =
    document.getElementById("adCurrency").value;
    const otherCurrency =
    document.getElementById("otherCurrency").value;
    const resultCurrency =
    document.getElementById("resultCurrency").value;
    // CONVERT EVERYTHING
    const revenue =
    await convertCurrency(
        sellingTotal,
        sellingCurrency,
        resultCurrency
    );
    const buyCost =
    await convertCurrency(
        buyingTotal,
        buyingCurrency,
        resultCurrency
    );
    const adConverted =
    await convertCurrency(
        adCost,
        adCurrency,
        resultCurrency
    );
    const otherConverted =
    await convertCurrency(
        otherCost,
        otherCurrency,
        resultCurrency
    );
    // TOTAL COST
    const totalCost =
    buyCost +
    adConverted +
    otherConverted;
    // PROFIT
    const profit =
    revenue - totalCost;
    // DISPLAY
    if(profit > 0){
        resultBox.innerHTML = `
        <div class="profit">
        Profit: ${profit.toFixed(2)} ${resultCurrency}
        </div>
        <div class="details">
        Revenue:
        ${revenue.toFixed(2)} ${resultCurrency}
        <br><br>
        Total Cost:
        ${totalCost.toFixed(2)} ${resultCurrency}
        </div>
        `;
    }else if(profit < 0){
        resultBox.innerHTML = `
        <div class="loss">
        Loss: ${Math.abs(profit).toFixed(2)} ${resultCurrency}
        </div>
        <div class="details">
        Revenue:
        ${revenue.toFixed(2)} ${resultCurrency}
        <br><br>
        Total Cost:
        ${totalCost.toFixed(2)} ${resultCurrency}
        </div>
        `;
    }else{
        resultBox.innerHTML = `
        <div class="details">
        No Profit No Loss
        </div>
        `;
    }
}
</script>
</body>
</html>
